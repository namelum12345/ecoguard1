name: citizen_app
description: EcoGuard — vətəndaş müraciət platforması (Flutter web + Android)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.7.0

  # Routing
  go_router: ^14.6.2

  # State management
  provider: ^6.1.2

  # Token storage
  shared_preferences: ^2.3.3

  # Image picker (web + mobile)
  image_picker: ^1.1.2

  # Geolocation (web + mobile)
  geolocator: ^13.0.2

  # Map (web + mobile)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
